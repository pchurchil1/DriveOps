services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
    volumes:
      - telemetry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-telemetry}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-admin:
    image: postgres:16
    profiles: ["admin-ports"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    command: ["sh", "-c", "sleep infinity"]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  telemetry-api:
    build:
      context: ../Vehicle Telemetry API/vehicle-telemetry-api
    ports:
      - "${API_HOST_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: vehicle-telemetry-api
      ENVIRONMENT: dev
      LOG_LEVEL: INFO
      API_V1_PREFIX: /api/v1
      AUTH_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-local-demo-secret}
      JWT_EXPIRES_MINUTES: "60"
      CORS_ORIGINS: '["http://localhost:15173","http://127.0.0.1:15173","http://localhost:18080","http://127.0.0.1:18080","http://localhost:5173","http://127.0.0.1:5173"]'
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-telemetry}
      DATABASE_URL_TEST: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/telemetry_test
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 30

  telemetry-worker:
    build:
      context: ../Vehicle Telemetry API/vehicle-telemetry-api
    command: ["python", "-m", "app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      telemetry-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: vehicle-telemetry-api
      ENVIRONMENT: dev
      LOG_LEVEL: INFO
      API_V1_PREFIX: /api/v1
      AUTH_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-local-demo-secret}
      JWT_EXPIRES_MINUTES: "60"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-telemetry}
      DATABASE_URL_TEST: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/telemetry_test

  telemetry-init:
    build:
      context: ../Vehicle Telemetry API/vehicle-telemetry-api
    command: ["sh", "-c", "alembic upgrade head && python -m app.seed"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: vehicle-telemetry-api
      ENVIRONMENT: dev
      LOG_LEVEL: INFO
      API_V1_PREFIX: /api/v1
      AUTH_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-local-demo-secret}
      JWT_EXPIRES_MINUTES: "60"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-telemetry}
      DATABASE_URL_TEST: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/telemetry_test

  gateway:
    build:
      context: ../api-gateway-rate-limiter/api-gateway-rate-limiter
    ports:
      - "${GATEWAY_HOST_PORT:-18080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      telemetry-api:
        condition: service_healthy
      telemetry-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: api-gateway-rate-limiter
      ENVIRONMENT: dev
      REDIS_URL: redis://redis:6379/0
      UPSTREAM_BASE_URL: http://telemetry-api:8000
      RATE_LIMIT_CAPACITY: ${RATE_LIMIT_CAPACITY:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      UPSTREAM_TIMEOUT_SECONDS: ${UPSTREAM_TIMEOUT_SECONDS:-5}
      CORS_ORIGINS: '["http://localhost:15173","http://127.0.0.1:15173","http://localhost:5173","http://127.0.0.1:5173"]'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 30

  dashboard:
    build:
      context: ../Fleet Monitoring Dashboard/fleet-monitoring-dashboard
      args:
        VITE_API_BASE_URL: http://localhost:${GATEWAY_HOST_PORT:-18080}/api/v1
    ports:
      - "${DASHBOARD_HOST_PORT:-15173}:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  telemetry_pgdata:
