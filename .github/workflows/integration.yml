name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  TELEMETRY_API_CONTEXT: .ci/vehicle-telemetry-api
  DASHBOARD_CONTEXT: .ci/fleet-monitoring-dashboard
  GATEWAY_CONTEXT: .ci/api-gateway-rate-limiter
  JWT_SECRET_KEY: ci-local-demo-secret
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}

jobs:
  test-build-smoke:
    name: Test, build, and smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: telemetry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d telemetry_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out orchestration repo
        uses: actions/checkout@v4

      - name: Check out telemetry API
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vehicle-telemetry-api
          path: .ci/vehicle-telemetry-api

      - name: Check out dashboard
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fleet-monitoring-dashboard
          path: .ci/fleet-monitoring-dashboard

      - name: Check out gateway
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/api-gateway-rate-limiter
          path: .ci/api-gateway-rate-limiter

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test telemetry API
        working-directory: .ci/vehicle-telemetry-api
        env:
          DATABASE_URL: sqlite:////tmp/vehicle_telemetry_api_test.db
          DATABASE_URL_TEST: sqlite:////tmp/vehicle_telemetry_api_test.db
          ENVIRONMENT: test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest -q

      - name: Test telemetry API with PostgreSQL
        working-directory: .ci/vehicle-telemetry-api
        env:
          DATABASE_URL: postgresql+psycopg2://app:app@localhost:5432/telemetry_test
          DATABASE_URL_TEST: postgresql+psycopg2://app:app@localhost:5432/telemetry_test
          ENVIRONMENT: test
          RUN_POSTGRES_TESTS: "1"
        run: pytest -q -m postgres --no-cov

      - name: Test gateway
        working-directory: .ci/api-gateway-rate-limiter
        run: |
          pip install -r requirements.txt
          pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .ci/fleet-monitoring-dashboard/package-lock.json

      - name: Lint and build dashboard
        working-directory: .ci/fleet-monitoring-dashboard
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Start integrated stack
        run: docker compose up --build -d

      - name: Run local smoke checks
        run: make smoke

      - name: Show Compose logs
        if: always()
        run: docker compose logs --no-color

      - name: Stop integrated stack
        if: always()
        run: docker compose down -v

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out orchestration repo
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Validate bootstrap Terraform
        run: |
          terraform -chdir=infra/bootstrap init -backend=false
          terraform -chdir=infra/bootstrap validate

      - name: Validate prod-lite Terraform
        run: |
          terraform -chdir=infra/prod-lite init -backend=false
          terraform -chdir=infra/prod-lite validate

      - name: Configure AWS credentials for optional plan
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform plan prod-lite
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        run: terraform -chdir=infra/prod-lite plan -input=false -no-color
